name: "CodeQL"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Run CodeQL analysis every Monday at 00:00 UTC
    - cron: '0 0 * * 1'

# NOTE: CodeQL requires GitHub Advanced Security on private repos.
# This workflow will silently fail on Qarote-EE until GHAS is enabled,
# or until the analysis is run from the public CE mirror (getqarote/Qarote)
# which has GHAS for free. No action needed — the public mirror sync
# workflow will carry this file there and it will run correctly.

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # JavaScript language includes TypeScript
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

