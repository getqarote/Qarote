name: Deploy Landing to Staging

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/i18n/**"
      - ".github/workflows/deploy-landing-staging.yml"
  workflow_dispatch:

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Check package version consistency
        run: pnpm run syncpack:check

      - name: 🔍 Type Check
        run: pnpm turbo run type-check --filter=qarote-web

      - name: 🔍 Knip (unused code check)
        run: pnpm run knip

      - name: 🧹 Lint
        working-directory: apps/web
        run: pnpm run lint
        continue-on-error: false

      - name: 💅 Format Check
        working-directory: apps/web
        run: pnpm run format

  deploy-landing:
    name: Deploy Landing to Cloudflare Pages - Staging
    environment: staging
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts # Ignore scripts to avoid husky errors

      - name: 📦 Build i18n package
        run: pnpm turbo run build --filter=@qarote/i18n

      - name: Install Wrangler CLI globally
        run: npm install -g wrangler@3.90.0

      - name: 🏗️ Build landing page
        working-directory: apps/web
        env:
          VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL }}
          VITE_PORTAL_URL: ${{ vars.VITE_PORTAL_URL }}
          NODE_ENV: production
        run: pnpm run build

      - name: 🚀 Deploy to Cloudflare Pages - Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy apps/web/dist --project-name=qarote-landing-staging --branch=main --commit-hash=${{ github.sha }}

      - name: ✅ Deployment Success
        run: |
          echo "🎉 Landing page deployed successfully to staging!"
          echo "🌐 Staging URL: https://qarote-landing-staging.pages.dev"
          echo "📝 Commit: ${{ github.sha }}"
