name: PR-Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent:
    name: PR-Agent
    if: |
      github.event.sender.type != 'Bot' && (
        github.event_name == 'issue_comment' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    steps:
      - name: 🤖 Run PR-Agent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI.API_TYPE: anthropic
          CONFIG.AI_PROVIDER: anthropic
          CONFIG.MODEL: claude-sonnet-4-6
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG.AUTO_DESCRIBE: "true"
          CONFIG.AUTO_REVIEW: "true"
          CONFIG.AUTO_IMPROVE: "false"
          PR_REVIEWER.REQUIRE_TESTS_REVIEW: "true"
          PR_REVIEWER.USE_BULLET_POINTS: "true"
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            This is a TypeScript/Node.js monorepo (Hono.js API + React frontend).
            Focus on: type safety, Prisma query correctness, tRPC contract consistency,
            security (auth middleware, JWT handling), and React best practices.
            Flag any console.log left in production code.
