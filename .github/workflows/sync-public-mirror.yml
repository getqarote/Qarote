name: Sync public CE mirror

on:
  push:
    branches: [main]

# Serialize runs on the same ref so a slow job can't clobber a newer commit.
concurrency:
  group: sync-public-mirror-${{ github.ref }}
  cancel-in-progress: true

# This job only reads the source repo; push goes via PUBLIC_REPO_TOKEN.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          path: source

      - name: Checkout public mirror
        uses: actions/checkout@v4
        with:
          repository: getqarote/qarote
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public-repo
          fetch-depth: 0

      - name: Push CE mirror (without ee/)
        run: |
          git config --global user.email "ci@qarote.io"
          git config --global user.name "Qarote CI"

          # Explicitly remove EE directory and the private sync workflow so
          # --exclude on the source side cannot retain them if they ever
          # land in the mirror through a previous run or manual push.
          rm -rf public-repo/apps/api/src/ee
          rm -f  public-repo/.github/workflows/sync-public-mirror.yml

          rsync -av --delete \
            --exclude='.git' \
            --exclude='apps/api/src/ee' \
            --exclude='.github/workflows/sync-public-mirror.yml' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            source/ public-repo/

          # Fail the job if EE content somehow ended up in the mirror.
          if [ -d public-repo/apps/api/src/ee ]; then
            echo "ERROR: apps/api/src/ee exists in the public mirror — aborting." >&2
            exit 1
          fi

          # Fail the job if any CE file still contains an EE import — either
          # a relative ../ee/ path or the @/ee/ path alias. Both indicate a
          # boundary violation that must be resolved (stub/registry) before shipping.
          if grep -rE 'from\s+['"'"'"](@/ee/|[^'"'"'"]*\.\./.*ee/)' public-repo/apps/api/src/ 2>/dev/null; then
            echo "ERROR: EE imports (@/ee/ or ../ee/) found in CE tree — fix before pushing to mirror." >&2
            exit 1
          fi

          cd public-repo
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "chore: sync CE mirror $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
