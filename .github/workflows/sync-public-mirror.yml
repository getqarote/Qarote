name: Sync public CE mirror

on:
  push:
    branches: [main]

# Serialize runs on the same ref so a slow job can't clobber a newer commit.
concurrency:
  group: sync-public-mirror-${{ github.ref }}
  cancel-in-progress: true

# This job only reads the source repo; push goes via PUBLIC_REPO_TOKEN.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          path: source

      - name: Checkout public mirror
        uses: actions/checkout@v4
        with:
          repository: getqarote/qarote
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public-repo
          fetch-depth: 0

      - name: Push CE mirror (without ee/)
        run: |
          git config --global user.email "ci@qarote.io"
          git config --global user.name "Qarote CI"

          # Explicitly remove the EE directory from the mirror so --exclude
          # on the source side cannot silently retain stale EE content that
          # was accidentally pushed there in a previous run.
          rm -rf public-repo/apps/api/src/ee

          rsync -av --delete \
            --exclude='.git' \
            --exclude='apps/api/src/ee' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            source/ public-repo/

          # Fail the job if EE content somehow ended up in the mirror.
          if [ -d public-repo/apps/api/src/ee ]; then
            echo "ERROR: apps/api/src/ee exists in the public mirror — aborting." >&2
            exit 1
          fi

          cd public-repo
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "chore: sync CE mirror $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
