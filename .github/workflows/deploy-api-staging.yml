name: Deploy Backend to Staging

env:
  APP_NAME: qarote-staging
  # Dummy URL for prisma generate (postinstall) — no actual DB connection is made
  DATABASE_URL: postgresql://localhost:5432/dummy

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/i18n/**"
      - ".github/workflows/deploy-api-staging.yml"
  workflow_dispatch:

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Check package version consistency
        run: pnpm run syncpack:check

      - name: 🔍 Type Check
        run: pnpm turbo run type-check --filter=qarote-api

      - name: 🔍 Knip (unused code check)
        run: pnpm run knip

      - name: 🧹 Lint
        working-directory: apps/api
        run: pnpm run lint

      - name: 💅 Format Check
        working-directory: apps/api
        run: pnpm run format

      - name: 🧪 Run Tests
        working-directory: apps/api
        run: pnpm run test:run

  deploy-backend:
    name: Deploy Backend to Dokku - Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: quality-checks

    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for proper git operations

      - name: 🔑 Validate Dokku SSH key
        run: |
          if [ -z "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" ]; then
            echo "❌ Error: DOKKU_SSH_PRIVATE_KEY is empty or not set" >&2
            exit 1
          fi
          echo "✓ Dokku SSH key is present"

      - name: 🔑 Setup SSH for database configuration
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: 🏗️ Add SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.DOKKU_HOST }} >> ~/.ssh/known_hosts

      # should be done once
      - name: 📝 Configure Environment Variables
        run: |
          ssh dokku@${{ vars.DOKKU_HOST }} config:set ${{ env.APP_NAME }} \
            DEPLOYMENT_MODE=${{ vars.DEPLOYMENT_MODE }} \
            DOMAIN_BACKEND=${{ vars.DOMAIN_BACKEND }} \
            DOMAIN_FRONTEND=${{ vars.DOMAIN_FRONTEND }} \
            PORT=${{ vars.PORT }} \
            HOST=${{ vars.HOST }} \
            NODE_ENV=${{ vars.NODE_ENV }} \
            ENVIRONMENT=staging \
            LOG_LEVEL=${{ vars.LOG_LEVEL }} \
            JWT_SECRET=${{ secrets.JWT_SECRET }} \
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }} \
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }} \
            FRONTEND_URL=${{ vars.FRONTEND_URL }} \
            PORTAL_FRONTEND_URL=${{ vars.PORTAL_FRONTEND_URL }} \
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            FROM_EMAIL=${{ vars.FROM_EMAIL }} \
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
            STRIPE_DEVELOPER_MONTHLY_PRICE_ID=${{ vars.STRIPE_DEVELOPER_MONTHLY_PRICE_ID }} \
            STRIPE_DEVELOPER_YEARLY_PRICE_ID=${{ vars.STRIPE_DEVELOPER_YEARLY_PRICE_ID }} \
            STRIPE_ENTERPRISE_MONTHLY_PRICE_ID=${{ vars.STRIPE_ENTERPRISE_MONTHLY_PRICE_ID }} \
            STRIPE_ENTERPRISE_YEARLY_PRICE_ID=${{ vars.STRIPE_ENTERPRISE_YEARLY_PRICE_ID }} \
            SENTRY_DSN=${{ vars.SENTRY_DSN }} \
            SENTRY_ENABLED=${{ vars.SENTRY_ENABLED }} \
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            NOTION_API_KEY=${{ secrets.NOTION_API_KEY }} \
            NOTION_DATABASE_ID=${{ vars.NOTION_DATABASE_ID }} \
            NOTION_SYNC_ENABLED=${{ vars.NOTION_SYNC_ENABLED }} \
            ENABLE_NOTION=${{ vars.ENABLE_NOTION }} \
            API_URL=${{ vars.API_URL }}

      # Deploy the application
      - name: 🐳 Deploy to Dokku
        uses: dokku/github-action@master
        with:
          git_remote_url: "ssh://dokku@${{ vars.DOKKU_HOST }}:22/${{ env.APP_NAME }}"
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          git_push_flags: "--force"

      - name: 🔍 Debug Dokku Environment
        run: |
          echo "Checking environment variables in Dokku..."
          ssh dokku@${{ vars.DOKKU_HOST }} config:show ${{ env.APP_NAME }}
          echo "-----------------------------------------------"
          echo "Checking if app is running..."
          ssh dokku@${{ vars.DOKKU_HOST }} ps:report ${{ env.APP_NAME }}

      - name: 🩺 Verify health endpoints
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          echo "Testing health endpoint..."
          curl -sSf https://${{ vars.DOMAIN_BACKEND }}/health || echo "Health check not yet available, deployment may still be in progress"

      - name: ✅ Deployment complete
        run: |
          echo "🎉 Deployment to staging completed successfully!"
          echo "🔍 Backend URL: https://${{ vars.DOMAIN_BACKEND }}"
          echo "🔍 Health check: https://${{ vars.DOMAIN_BACKEND }}/health"
          echo "📝 Commit: ${{ github.sha }}"
