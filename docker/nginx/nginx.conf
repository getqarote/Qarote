server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers (shared include for all location blocks)
    include /etc/nginx/conf.d/security-headers.conf;

    # Cache static assets (nginx add_header in location blocks does NOT inherit
    # from parent — include security headers explicitly)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Cache i18n locale files (avoid max-age=0 waterfall)
    location /locales/ {
        add_header Cache-Control "public, max-age=3600" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Known SPA routes -- serve index.html for client-side routing
    # Keep this list in sync with App.tsx routes
    location ~ ^/(privacy-policy|terms-of-service|changelog|fr|es|zh)(/.*)?$ {
        try_files $uri /index.html;
    }

    # Root path
    location = / {
        try_files /index.html =404;
    }

    # Static files, assets, and everything else -- serve directly
    # Unknown paths fall through to the 404 error page
    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404 error page with proper HTTP status
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
