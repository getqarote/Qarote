# Qarote Self-Hosted Deployment
#
# Quick Start:
# 1. Run: ./setup.sh
# 2. Run: docker compose -f docker-compose.selfhosted.yml up -d
#
# Premium features are activated via the UI with a license JWT.
# RabbitMQ servers are customer-provided (not included in this compose file).

services:
  postgres:
    image: postgres:15-alpine
    container_name: qarote_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qarote
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qarote_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qarote"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: qarote_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/qarote
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Optional: Email configuration (disabled by default)
      # Only needed if ENABLE_EMAIL=true
      # FROM_EMAIL defaults to noreply@localhost, FRONTEND_URL defaults to http://localhost:8080
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      # Optional: SMTP settings (only needed if ENABLE_EMAIL=true)
      # Basic Authentication (simple):
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      # OAuth2 Authentication (recommended for production - see docs/SELF_HOSTED_DEPLOYMENT.md):
      # SMTP_SERVICE: ${SMTP_SERVICE}
      # SMTP_OAUTH_CLIENT_ID: ${SMTP_OAUTH_CLIENT_ID}
      # SMTP_OAUTH_CLIENT_SECRET: ${SMTP_OAUTH_CLIENT_SECRET}
      # SMTP_OAUTH_REFRESH_TOKEN: ${SMTP_OAUTH_REFRESH_TOKEN}
      # Optional: SSO configuration (see docs/SELF_HOSTED_DEPLOYMENT.md)
      # SSO_ENABLED: ${SSO_ENABLED:-false}
      # SSO_TYPE: ${SSO_TYPE:-oidc}
      # SSO_OIDC_DISCOVERY_URL: ${SSO_OIDC_DISCOVERY_URL}
      # SSO_OIDC_CLIENT_ID: ${SSO_OIDC_CLIENT_ID}
      # SSO_OIDC_CLIENT_SECRET: ${SSO_OIDC_CLIENT_SECRET}
      # SSO_SAML_METADATA_URL: ${SSO_SAML_METADATA_URL}
      # API_URL: ${API_URL:-http://localhost:3000}
      # FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      # SSO_TENANT: ${SSO_TENANT:-default}
      # SSO_PRODUCT: ${SSO_PRODUCT:-qarote}
      # SSO_BUTTON_LABEL: ${SSO_BUTTON_LABEL:-Sign in with SSO}
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qarote_network

  frontend:
    build:
      context: .
      dockerfile: ./apps/app/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_PORTAL_URL: ${VITE_PORTAL_URL}
    container_name: qarote_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - qarote_network

volumes:
  postgres_data:
    driver: local

networks:
  qarote_network:
    driver: bridge
