services:
  postgres:
    image: postgres:15-alpine
    container_name: qarote_e2e_postgres
    environment:
      POSTGRES_DB: qarote_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qarote_e2e"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: qarote_e2e_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5682:5672"
      - "15682:15672"
    volumes:
      - ../../../docker/rabbitmq/local-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ../../../docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
